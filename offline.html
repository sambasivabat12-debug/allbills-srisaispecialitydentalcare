<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e3f5a">
  <title>Offline — Sri Sai Speciality Dental Care</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e3f5a 0%, #2c5aa0 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 20px;
      padding: 48px 40px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
    }

    .clinic-name {
      font-size: 18px;
      font-weight: 700;
      opacity: 0.9;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      opacity: 0.8;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      background: white;
      color: #1e3f5a;
      font-size: 15px;
      font-weight: 700;
      padding: 14px 32px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn:hover   { opacity: 0.92; transform: translateY(-1px); }
    .btn:active  { transform: translateY(0); }

    .contact {
      margin-top: 28px;
      font-size: 13px;
      opacity: 0.65;
      line-height: 1.7;
    }

    .contact a {
      color: #d4af37;
      text-decoration: none;
      font-weight: 600;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #e74c3c;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
      vertical-align: middle;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🦷</span>
    <div class="clinic-name">Sri Sai Speciality Dental Care</div>
    <h1>You're Offline</h1>
    <p>
      <span class="status-dot"></span>No internet connection detected.<br>
      Please check your Wi-Fi or mobile data and try again.
    </p>
    <button class="btn" onclick="tryReload()">Try Again</button>
    <div class="contact">
      Need urgent help? Call us:<br>
      <a href="tel:8688033072">8688033072</a> &nbsp;|&nbsp;
      <a href="tel:9396522492">9396522492</a>
    </div>
  </div>

  <script>
    function tryReload() {
      window.location.reload();
    }

    // Auto-retry when connection comes back
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
